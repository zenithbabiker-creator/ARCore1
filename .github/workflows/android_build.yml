name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          # 1. إعداد الذاكرة
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g" > gradle.properties
          
          # 2. الانتقال للمجلد الذي يحتوي على ملفات المشروع الحقيقية
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # 3. إصلاح الأيقونة في المسار الصحيح المكتشف
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' app/src/main/AndroidManifest.xml
          
          # 4. البناء من هذا المجلد
          ./gradlew clean assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/debug/app-debug.apk
