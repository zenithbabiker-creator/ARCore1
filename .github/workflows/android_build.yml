name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          # زيادة مساحة الذاكرة
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" > gradle.properties
          
          # حل مشكلة الأيقونة المفقودة تلقائياً عبر استبدال النص في الـ Manifest
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' LandscapeDesignApp/LandscapeDesignApp/app/src/main/AndroidManifest.xml
          
          # الانتقال إلى المجلد الذي يحتوي على ملف البناء
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # استخدام gradle المثبت في النظام لتنفيذ البناء
          gradle assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/debug/app-debug.apk
