name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          # 1. طباعة محتويات المجلد للتأكد من وجود ملف gradlew
          ls -R
          
          # 2. البحث عن مكان ملف gradlew وتحديد مساره
          GRADLEW_PATH=$(find . -name "gradlew" | head -n 1)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found!"
            exit 1
          fi
          
          echo "Found gradlew at: $GRADLEW_PATH"
          
          # 3. إعطاء صلاحية التنفيذ للملف الموجود
          chmod +x "$GRADLEW_PATH"
          
          # 4. ضبط الذاكرة
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" > gradle.properties
          
          # 5. تنفيذ البناء باستخدام المسار الذي تم العثور عليه
          "$GRADLEW_PATH" assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: app/build/outputs/apk/debug/app-debug.apk
