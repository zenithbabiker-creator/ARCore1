name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # فرض استخدام الذاكرة مباشرة عبر متغيرات النظام لضمان استجابة Gradle
      GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=1g"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          # حل مشكلة الأيقونة تلقائياً
          sed -i 's|android:icon="@mipmap/ic_launcher"|android:icon="@android:drawable/sym_def_app_icon"|g' LandscapeDesignApp/LandscapeDesignApp/app/src/main/AndroidManifest.xml
          
          # الانتقال للمجلد الصحيح
          cd LandscapeDesignApp/LandscapeDesignApp
          
          # تشغيل البناء مع استبعاد الـ Lint والـ Tests لتوفير الذاكرة
          gradle assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true -x lint -x test

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LandscapeDesignApp
          path: LandscapeDesignApp/LandscapeDesignApp/app/build/outputs/apk/debug/app-debug.apk
